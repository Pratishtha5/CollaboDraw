spring.application.name=collabodraw

# Load local .env automatically (KEY=VALUE format) for local runs.
# This lets `mvn spring-boot:run` resolve DB_HOST/DB_PORT/DB_USER/DB_PASS
# without requiring manual environment export.
spring.config.import=optional:file:.env[.properties]

# Default to Aiven so plain `mvn spring-boot:run` targets the real database.
spring.profiles.default=aiven

# Common settings shared by all profiles
spring.jpa.open-in-view=false
spring.web.resources.add-mappings=true
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot.autoconfigure.web=INFO

# Server port (optional override)
# server.port=8080
# OAuth2 Configuration - Google Login (externalize secrets via env)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# OAuth2 Provider - Google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email
